spring.datasource.url=${DB_URL:jdbc:h2:mem:food_order_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# To use MySQL instead of H2, set environment variables (or system property):
# DB_URL=jdbc:mysql://localhost:3306/food_order_db?createDatabaseIfNotExist=true
# DB_USERNAME=your_mysql_user
# DB_PASSWORD=your_mysql_password
# DB_DRIVER=com.mysql.cj.jdbc.Driver
# JPA_DIALECT=org.hibernate.dialect.MySQL8Dialect

# H2 Console for viewing data
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080


# Base64-encoded 32+ byte secret key
app.jwt.secret=QmFzZTY0U2VjcmV0S2V5Rm9yRm9vZE9yZGVyU3lzdGVtMTIzNDU2Nzg5MDEy
app.jwt.expiration-ms=86400000
